services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm_observatory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm -d llm_observatory"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      POSTGRES_URL: postgresql://llm:llm@postgres:5432/llm_observatory
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-placeholder}
      BUDGET_LIMIT_SGD: ${BUDGET_LIMIT_SGD:-10.00}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
